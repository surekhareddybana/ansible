- name: create ec2 and r53 
  hosts: local
  connection: local
  vars:
    instances: #this is variable name
      - frontend # these are all variable values
      - mysql
      - backend
    subnet_id: subnet-0063079a1ab1cd62b
    sg_id: sg-00953dfcb5786f057
  tasks:
  - name: create ec2
    amazon.aws.ec2_instance:
       name: "{{ item }}"
       vpc_subnet_id: "{{ subnet_id }}"
       instance_type: t3.micro
       security_group: "{{ sg_id }}"
       image_id: ami-0220d79f3f480ecf5
       tags: 
       Environment: Testing
    loop: "{{ instance }}"
